<div class="glass-card h-full">
  <h2 class="section-title mb-4">Register New Hotel</h2>
  <form (ngSubmit)="onSubmit()">
    <div class="form-group mb-3">
      <label class="form-label">Hotel Name</label>
      <input type="text" name="hotelName" [(ngModel)]="formModel().name" required class="form-input" placeholder="The Grand Palace" />
    </div>

    <div class="form-group mb-3">
      <label class="form-label">Location / City</label>
      <input type="text" name="hotelLoc" [(ngModel)]="formModel().location" required class="form-input" placeholder="Goa, India" />
    </div>

    <div class="form-group mb-3">
      <label class="form-label">Description</label>
      <textarea name="hotelDesc" [(ngModel)]="formModel().description" required rows="3" class="form-input" placeholder="A 5-star beachfront resort..."></textarea>
    </div>

    <div class="form-group mb-3">
      <label class="form-label">Amenities (Comma separated)</label>
      <input type="text" name="hotelAms" [(ngModel)]="formModel().amenities" class="form-input" placeholder="WiFi, Pool, Spa, Parking, Gym" />
    </div>

    <button type="submit" [disabled]="submitting()" class="btn btn-primary w-full mt-4">
      @if (submitting()) {
        <span class="loader"></span>
      } @else {
        Create Hotel
      }
    </button>
  </form>
</div>
