<form (ngSubmit)="onSubmit()" #loginForm="ngForm">
  <h2 class="form-title">Welcome Back</h2>
  <p class="form-subtitle">Enter your credentials to manage bookings</p>

  <div class="form-group">
    <label class="form-label">Email Address</label>
    <input 
      type="email" 
      name="email"
      [(ngModel)]="loginData.email"
      required
      email
      #loginEmail="ngModel"
      class="form-input" 
      placeholder="you@example.com" />
    <span class="validation-error" *ngIf="loginEmail.touched && loginEmail.invalid">
      Please enter a valid email address
    </span>
  </div>

  <div class="form-group">
    <label class="form-label">Password</label>
    <input 
      type="password" 
      name="password"
      [(ngModel)]="loginData.password"
      required
      #loginPwd="ngModel"
      class="form-input" 
      placeholder="••••••••" />
    <span class="validation-error" *ngIf="loginPwd.touched && loginPwd.invalid">
      Password is required
    </span>
  </div>

  <button 
    type="submit" 
    [disabled]="loginForm.invalid || loading()" 
    class="btn btn-primary w-full mt-4">
    <span *ngIf="!loading()">Sign In</span>
    <span *ngIf="loading()" class="loader"></span>
  </button>
</form>
