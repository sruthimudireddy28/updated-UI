<form (ngSubmit)="onSubmit()" #registerForm="ngForm">
  <h2 class="form-title">Create Account</h2>
  <p class="form-subtitle">Join SmartHotel rewards and start booking</p>

  <div class="form-group">
    <label class="form-label">Full Name</label>
    <input 
      type="text" 
      name="name"
      [(ngModel)]="registerData.name"
      required
      minlength="3"
      #regName="ngModel"
      class="form-input" 
      placeholder="full name" />
    <span class="validation-error" *ngIf="regName.touched && regName.invalid">
      Name is required (min 3 chars)
    </span>
  </div>

  <div class="form-group">
    <label class="form-label">Email Address</label>
    <input 
      type="email" 
      name="email"
      [(ngModel)]="registerData.email"
      required
      email
      #regEmail="ngModel"
      class="form-input" 
      placeholder="your email " />
    <span class="validation-error" *ngIf="regEmail.touched && regEmail.invalid">
      Enter a valid email address
    </span>
  </div>

  <div class="form-group">
    <label class="form-label">Contact Number</label>
    <input 
      type="tel" 
      name="contact"
      [(ngModel)]="registerData.contactNumber"
      required
      #regContact="ngModel"
      class="form-input" 
      placeholder="+910000000" />
    <span class="validation-error" *ngIf="regContact.touched && regContact.invalid">
      Contact number is required
    </span>
  </div>

  <div class="form-group">
    <label class="form-label">Password</label>
    <input 
      type="password" 
      name="password"
      [(ngModel)]="registerData.password"
      required
      minlength="6"
      #regPwd="ngModel"
      class="form-input" 
      placeholder="•••••••• (min 6 characters)" />
    <span class="validation-error" *ngIf="regPwd.touched && regPwd.invalid">
      Password must be at least 6 characters
    </span>
  </div>

  <div class="form-group checkbox-group" style="display: flex; align-items: center; gap: 0.75rem; margin-top: 1.25rem; margin-bottom: 1.25rem; background: rgba(255, 255, 255, 0.03); padding: 0.75rem; border-radius: var(--border-radius-md); border: 1px solid var(--border-color);">
    <input 
      type="checkbox" 
      id="requestManager"
      name="requestManager"
      [checked]="registerData.role === 'Manager'"
      (change)="onRoleToggle($event)"
      style="width: 1.2rem; height: 1.2rem; cursor: pointer; accent-color: var(--accent-indigo);" />
    <label for="requestManager" class="form-label" style="margin-bottom: 0; cursor: pointer; font-size: 0.9rem; user-select: none;">
      Request <strong>Hotel Manager</strong> access
    </label>
  </div>

  <button 
    type="submit" 
    [disabled]="registerForm.invalid || loading()" 
    class="btn btn-primary w-full mt-4">
    <span *ngIf="!loading()">Register</span>
    <span *ngIf="loading()" class="loader"></span>
  </button>
</form>
