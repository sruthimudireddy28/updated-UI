<section class="search-bar glass-card mb-8">
  <h2 class="search-title mb-3">Find Your Perfect Stay</h2>
  
  <form (ngSubmit)="onSearchSubmit()" class="search-form">
    <div class="form-group flex-2">
      <label class="form-label">Destination / Location</label>
      <input 
        type="text" 
        name="location"
        [(ngModel)]="filters().location"
        class="form-input" 
        placeholder="Where are you going? (e.g. New York, Goa)" />
    </div>

    <div class="form-group flex-1">
      <label class="form-label">Min Rating</label>
      <select name="rating" [(ngModel)]="filters().rating" class="form-input select-input">
        <option [value]="0">Any Rating</option>
        <option [value]="3">3+ Stars</option>
        <option [value]="4">4+ Stars</option>
        <option [value]="4.5">4.5+ Stars</option>
      </select>
    </div>

    <!-- <div class="form-group flex-1">
      <label class="form-label">Min Price (₹)</label>
      <input 
        type="number" 
        name="minPrice"
        [(ngModel)]="filters().minPrice"
        class="form-input" 
        placeholder="0" />
    </div> -->

    <!-- <div class="form-group flex-1">
      <label class="form-label">Max Price (₹)</label>
      <input 
        type="number" 
        name="maxPrice"
        [(ngModel)]="filters().maxPrice"
        class="form-input" 
        placeholder="50000" />
    </div> -->

    <div class="search-btn-wrapper">
      <button type="submit" class="btn btn-primary w-full search-btn">
        🔍 Search
      </button>
    </div>
  </form>
</section>
