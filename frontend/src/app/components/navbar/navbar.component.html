<nav class="navbar animate-fade-in">
  <div class="nav-container">
    <a routerLink="/" class="nav-logo">
      <span class="logo-icon">🏨</span>
      <span class="logo-text">SmartHotel</span>
    </a>

    <div class="nav-links">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-link">Hotels</a>
      <a *ngIf="auth.isLoggedIn()" routerLink="/dashboard" routerLinkActive="active" class="nav-link">My Dashboard</a>
      <a *ngIf="auth.isManager()" routerLink="/admin" routerLinkActive="active" class="nav-link">Management</a>
    </div>

    <div class="nav-actions">
      <!-- Light/Dark Mode Toggle
      <button (click)="toggleTheme()" class="theme-toggle-btn" aria-label="Toggle theme">
        <span *ngIf="isLightTheme()">🌙</span>
        <span *ngIf="!isLightTheme()">☀️</span>
      </button> -->

      <!-- User Section -->
      <ng-container *ngIf="auth.isLoggedIn(); else guestTpl">
        <div class="user-profile">
          <div class="avatar">{{ getInitials() }}</div>
          <div class="user-info">
            <span class="user-name">{{ auth.currentUser()?.name }}</span>
            <span class="user-role badge" [ngClass]="getRoleClass()">{{ auth.currentUser()?.role }}</span>
          </div>
          <button (click)="logout()" class="btn-logout" title="Sign Out">
            🚪
          </button>
        </div>
      </ng-container>

      <ng-template #guestTpl>
        <a routerLink="/auth" class="btn btn-primary">Sign In / Register</a>
      </ng-template>
    </div>
  </div>
</nav>
